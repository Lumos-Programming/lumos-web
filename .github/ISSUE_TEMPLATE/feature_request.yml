name: 機能要望
description: 新機能や改善の提案
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        該当する項目のみ入力してください。全て任意項目です。
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どのような機能を追加・改善したいですか？
    validations:
      required: false
  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要ですか？
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのように実現するのが良いと考えますか？
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した方法があれば記載してください
    validations:
      required: false
