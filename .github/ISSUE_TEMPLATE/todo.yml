name: 開発TODO
description: 開発タスクやリファクタリングなどのTODO
title: "[TODO] "
labels: ["todo"]
body:
  - type: markdown
    attributes:
      value: |
        該当する項目のみ入力してください。全て任意項目です。
  - type: textarea
    id: task
    attributes:
      label: やること
      description: 何を対応する必要がありますか？
    validations:
      required: false
  - type: textarea
    id: reason
    attributes:
      label: 背景・理由
      description: なぜこの対応が必要ですか？
    validations:
      required: false
  - type: textarea
    id: approach
    attributes:
      label: 対応方針
      description: 対応方針や実装案があれば記載してください
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: 関連Issue/PR
      description: 関連するIssueやPRがあればリンクしてください
    validations:
      required: false
